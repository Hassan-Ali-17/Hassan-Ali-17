<svg viewBox="0 0 1200 8" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1e1e"/>
      <stop offset="50%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#00eaff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="8" fill="url(#baseGrad)"/>
  <rect x="-120" y="0" width="120" height="8" fill="#ffffff" opacity="0.9">
    <animate attributeName="x" values="-120;1200" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="0.6s" repeatCount="indefinite"/>
  </rect>
</svg>
